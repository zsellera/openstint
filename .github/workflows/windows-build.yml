name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DEPS_DIR: ${{ github.workspace }}/deps

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python packages
      run: pip install pybind11

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install vcpkg dependencies
      run: |
        vcpkg install zeromq cppzmq libusb pthreads --triplet x64-windows
      env:
        VCPKG_ROOT: C:\vcpkg

    - name: Download liquid-dsp (MSVC)
      run: |
        mkdir "${{ env.DEPS_DIR }}\liquid\include\liquid"
        mkdir "${{ env.DEPS_DIR }}\liquid\lib"
        mkdir "${{ env.DEPS_DIR }}\liquid\bin"
        curl -sL -o "${{ env.DEPS_DIR }}\liquid\include\liquid\liquid.h" https://raw.githubusercontent.com/cjcliffe/CubicSDR/master/external/liquid-dsp/include/liquid/liquid.h
        curl -sL -o "${{ env.DEPS_DIR }}\liquid\lib\libliquid.lib" https://raw.githubusercontent.com/cjcliffe/CubicSDR/master/external/liquid-dsp/msvc/64/libliquid.lib
        curl -sL -o "${{ env.DEPS_DIR }}\liquid\bin\libliquid.dll" https://raw.githubusercontent.com/cjcliffe/CubicSDR/master/external/liquid-dsp/msvc/64/libliquid.dll

    - name: Build libfec (MSVC)
      run: |
        git clone https://github.com/quiet/libfec.git
        cd libfec
        mkdir build && cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
          -DCMAKE_C_FLAGS="/W3 /EHsc" ^
          -DCMAKE_INSTALL_PREFIX="${{ env.DEPS_DIR }}\libfec" ..
        ninja fec
        mkdir "${{ env.DEPS_DIR }}\libfec\lib"
        mkdir "${{ env.DEPS_DIR }}\libfec\include"
        copy fec.lib "${{ env.DEPS_DIR }}\libfec\lib\"
        copy ..\fec.h "${{ env.DEPS_DIR }}\libfec\include\"

    - name: Build rtl-sdr (MSVC)
      run: |
        git clone https://github.com/osmocom/rtl-sdr.git
        cd rtl-sdr
        mkdir build && cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
          -DLIBUSB_LIBRARIES="C:\vcpkg\installed\x64-windows\lib\libusb-1.0.lib" ^
          -DLIBUSB_INCLUDE_DIRS="C:\vcpkg\installed\x64-windows\include\libusb-1.0" ^
          -DTHREADS_PTHREADS_LIBRARY="C:\vcpkg\installed\x64-windows\lib\pthreadVC3.lib" ^
          -DTHREADS_PTHREADS_INCLUDE_DIR="C:\vcpkg\installed\x64-windows\include" ^
          -DCMAKE_INSTALL_PREFIX="${{ env.DEPS_DIR }}\rtl-sdr" ..
        ninja
        ninja install

    - name: Build hackrf (MSVC)
      run: |
        git clone https://github.com/greatscottgadgets/hackrf.git
        cd hackrf/host/libhackrf
        mkdir build && cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
          -DCMAKE_PREFIX_PATH="C:\vcpkg\installed\x64-windows" ^
          -DCMAKE_INSTALL_PREFIX="${{ env.DEPS_DIR }}\hackrf" ..
        ninja
        ninja install

    - name: Build OpenStint
      run: |
        mkdir build && cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DUSE_PYTHON=ON ^
          -DCMAKE_PREFIX_PATH="C:\vcpkg\installed\x64-windows;${{ env.DEPS_DIR }}\hackrf;${{ env.DEPS_DIR }}\rtl-sdr" ^
          -DLIQUID_INCLUDE_DIR="${{ env.DEPS_DIR }}\liquid\include" ^
          -DLIQUID_LIB="${{ env.DEPS_DIR }}\liquid\lib\libliquid.lib" ^
          -DFEC_INCLUDE_DIR="${{ env.DEPS_DIR }}\libfec\include" ^
          -DFEC_LIB="${{ env.DEPS_DIR }}\libfec\lib\fec.lib" ^
          -DHACKRF_INCLUDE_DIR="${{ env.DEPS_DIR }}\hackrf\include" ^
          -DHACKRF_LIB="${{ env.DEPS_DIR }}\hackrf\lib\hackrf.lib" ^
          -DRTLSDR_INCLUDE_DIR="${{ env.DEPS_DIR }}\rtl-sdr\include" ^
          -DRTLSDR_LIB="${{ env.DEPS_DIR }}\rtl-sdr\lib\rtlsdr.lib" ..
        ninja

    - name: Test openstint Python import
      run: |
        set PYTHONPATH=build\src
        python -c "import openstint; print('openstint loaded OK')"
      env:
        PYTHONPATH: build/src
        PATH: ${{ env.DEPS_DIR }}\liquid\bin;${{ env.DEPS_DIR }}\libfec\lib;${{ github.workspace }}\build\src;${{ env.PATH }}

    - name: Build bridge .exe
      if: matrix.build_type == 'Release'
      run: |
        pip install pyzmq tornado pyinstaller
        pyinstaller --onefile --name bridge-zround --hidden-import=zmq --hidden-import=tornado integrations/bridge-zround.py
        pyinstaller --onefile --name bridge-rcgtiming --hidden-import=zmq --hidden-import=tornado integrations/bridge-rcgtiming.py

    - name: Build desktop .exe
      if: matrix.build_type == 'Release'
      run: |
        pip install pyzmq pyrtlsdr pyrtlsdrlib numpy Pillow pyinstaller
        python desktop/build.py
      env:
        PYTHONPATH: build/src
        DEPS_DIR: ${{ env.DEPS_DIR }}

    - name: Package binaries
      run: |
        mkdir openstint-windows-x64
        copy build\src\openstint_hackrf.exe openstint-windows-x64\
        copy build\src\openstint_rtlsdr.exe openstint-windows-x64\
        copy "${{ env.DEPS_DIR }}\liquid\bin\libliquid.dll" openstint-windows-x64\
        copy "${{ env.DEPS_DIR }}\rtl-sdr\bin\*.dll" openstint-windows-x64\
        copy "${{ env.DEPS_DIR }}\hackrf\bin\*.dll" openstint-windows-x64\
        copy "C:\vcpkg\installed\x64-windows\bin\libusb-1.0.dll" openstint-windows-x64\
        copy "C:\vcpkg\installed\x64-windows\bin\libzmq*.dll" openstint-windows-x64\
        copy README.md openstint-windows-x64\
        copy LICENSE openstint-windows-x64\
        copy tools\start.bat openstint-windows-x64\
        xcopy /E /I integrations openstint-windows-x64\integrations

    - name: Add bridge and desktop executables
      if: matrix.build_type == 'Release'
      run: |
        copy dist\bridge-zround.exe openstint-windows-x64\
        copy dist\bridge-rcgtiming.exe openstint-windows-x64\
        copy dist\openstint-desktop.exe openstint-windows-x64\

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openstint-windows-x64-${{ matrix.build_type }}
        path: openstint-windows-x64/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Compute release metadata
      id: meta
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        else
          BRANCH="${GITHUB_REF_NAME}"
          echo "tag=nightly-${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "name=Nightly Windows Build (${BRANCH})" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Download release ZIPs
      uses: actions/download-artifact@v8
      with:
        pattern: openstint-windows-x64-*
        merge-multiple: true
        path: release-zips
        skip-decompress: true

    - name: Create or update release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.meta.outputs.tag }}
        name: ${{ steps.meta.outputs.name }}
        body: |
          Automated build of OpenStint for Windows 64-bit

          Branch: ${{ github.ref_name }}
          Built from commit ${{ github.sha }}
        files: release-zips/*.zip
        prerelease: ${{ steps.meta.outputs.prerelease }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
