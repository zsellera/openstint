name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release, Debug]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        cache: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-zeromq
          mingw-w64-x86_64-cppzmq
          mingw-w64-x86_64-hackrf
          mingw-w64-x86_64-rtl-sdr
          mingw-w64-x86_64-python
          mingw-w64-x86_64-python-pip
          mingw-w64-x86_64-pybind11
          mingw-w64-x86_64-python-numpy
          mingw-w64-x86_64-python-pillow
          mingw-w64-x86_64-tk
          git
          make
          autoconf
          automake
          libtool
          pkg-config
          zip

    - name: Build and install libfec
      shell: msys2 {0}
      run: |
        git clone https://github.com/quiet/libfec.git
        cd libfec
        ./configure --prefix=/mingw64
        # Fix MinGW build: remove -lc flag and use .dll.a extension for shared library
        sed -i 's/-lc$//' Makefile
        sed -i 's/libfec\.so/libfec.dll/' Makefile
        make
        mkdir -p /mingw64/lib
        cp libfec.dll libfec.a /mingw64/lib
        cp fec.h /mingw64/include
        cd ..

    - name: Build and install liquid-dsp
      shell: msys2 {0}
      run: |
        mkdir -p /mingw64/include/liquid
        curl --output /mingw64/include/liquid/liquid.h https://raw.githubusercontent.com/cjcliffe/CubicSDR/refs/heads/master/external/liquid-dsp/include/liquid/liquid.h
        curl --output /mingw64/bin/libliquid.a https://raw.githubusercontent.com/cjcliffe/CubicSDR/refs/heads/master/external/liquid-dsp/gcc/64/libliquid.a
        curl --output /mingw64/bin/libliquid.dll https://raw.githubusercontent.com/cjcliffe/CubicSDR/refs/heads/master/external/liquid-dsp/gcc/64/libliquid.dll

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pybind11
      run: pip install pybind11

    - name: Build OpenStint
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        PYTHON_EXE=$(ls /c/hostedtoolcache/windows/Python/3.12.*/x64/python.exe 2>/dev/null | head -1)
        if [ -n "$PYTHON_EXE" ]; then
          PYBIND11_DIR=$("$PYTHON_EXE" -c "import pybind11; print(pybind11.get_cmake_dir())" | tr '\\' '/')
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DUSE_PYTHON=ON \
            -DPython_EXECUTABLE="$PYTHON_EXE" \
            -Dpybind11_DIR="$PYBIND11_DIR" ..
        else
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ..
        fi
        ninja

    - name: Build bridge .exe
      if: matrix.build_type == 'Release'
      run: |
        pip install pyzmq tornado pyinstaller
        pyinstaller --onefile --name bridge-zround --hidden-import=zmq --hidden-import=tornado integrations/bridge-zround.py
        pyinstaller --onefile --name bridge-rcgtiming --hidden-import=zmq --hidden-import=tornado integrations/bridge-rcgtiming.py

    - name: Build desktop .exe
      if: matrix.build_type == 'Release'
      run: |
        pip install pyzmq pyrtlsdr pyrtlsdrlib numpy Pillow pyinstaller
        python desktop/build.py

    - name: Package binaries
      shell: msys2 {0}
      run: |
        mkdir openstint-windows-x64
        cp build/src/openstint_hackrf.exe openstint-windows-x64/
        cp build/src/openstint_rtlsdr.exe openstint-windows-x64/
        # Copy required DLLs (union of both binaries)
        ldd build/src/openstint_hackrf.exe build/src/openstint_rtlsdr.exe | grep mingw64 | awk '{print $3}' | sort -u | xargs -I{} cp {} openstint-windows-x64/ || true
        cp README.md openstint-windows-x64/
        cp LICENSE openstint-windows-x64/
        cp tools/start.bat openstint-windows-x64/
        cp -r integrations openstint-windows-x64/

    - name: Add bridge and desktop executables
      if: matrix.build_type == 'Release'
      shell: msys2 {0}
      run: |
        cp dist/bridge-zround.exe openstint-windows-x64/
        cp dist/bridge-rcgtiming.exe openstint-windows-x64/
        cp dist/openstint-desktop.exe openstint-windows-x64/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openstint-windows-x64-${{ matrix.build_type }}
        path: openstint-windows-x64/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Compute release metadata
      id: meta
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        else
          BRANCH="${GITHUB_REF_NAME}"
          echo "tag=nightly-${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "name=Nightly Windows Build (${BRANCH})" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Download release ZIPs
      uses: actions/download-artifact@v8
      with:
        pattern: openstint-windows-x64-*
        merge-multiple: true
        path: release-zips
        skip-decompress: true

    - name: Create or update release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.meta.outputs.tag }}
        name: ${{ steps.meta.outputs.name }}
        body: |
          Automated build of OpenStint for Windows 64-bit

          Branch: ${{ github.ref_name }}
          Built from commit ${{ github.sha }}
        files: release-zips/*.zip
        prerelease: ${{ steps.meta.outputs.prerelease }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
